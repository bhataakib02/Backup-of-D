apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-monitoring-config
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - "nexus_rules.yml"
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093
    scrape_configs:
      - job_name: 'nexus-backend'
        static_configs:
          - targets: ['nexus-backend-service:80']
        metrics_path: '/api/metrics'
        scrape_interval: 30s
      - job_name: 'nexus-frontend'
        static_configs:
          - targets: ['nexus-frontend-service:80']
        metrics_path: '/metrics'
        scrape_interval: 30s
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - nexus-cyber-intelligence
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
  nexus_rules.yml: |
    groups:
    - name: nexus-alerts
      rules:
      - alert: NexusBackendDown
        expr: up{job="nexus-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nexus Backend is down"
          description: "Nexus Backend has been down for more than 1 minute"
      - alert: NexusFrontendDown
        expr: up{job="nexus-frontend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nexus Frontend is down"
          description: "Nexus Frontend has been down for more than 1 minute"
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes"
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 80% for more than 5 minutes"
      - alert: PodCrashLoopBackOff
        expr: kube_pod_status_phase{phase="Running"} == 0 and kube_pod_status_phase{phase="Pending"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod in CrashLoopBackOff"
          description: "Pod {{ $labels.pod }} is in CrashLoopBackOff state"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-prometheus
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-prometheus
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-prometheus
  template:
    metadata:
      labels:
        app: nexus-prometheus
        tier: monitoring
    spec:
      serviceAccountName: nexus-prometheus-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9090
          name: http
          protocol: TCP
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus/
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --storage.tsdb.retention.time=30d
        - --web.enable-lifecycle
        - --web.enable-admin-api
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
          readOnly: true
        - name: storage-volume
          mountPath: /prometheus
      volumes:
      - name: config-volume
        configMap:
          name: nexus-monitoring-config
      - name: storage-volume
        persistentVolumeClaim:
          claimName: nexus-monitoring-pvc
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-prometheus-service
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-prometheus
spec:
  selector:
    app: nexus-prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-prometheus-sa
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nexus-prometheus-role
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nexus-prometheus-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nexus-prometheus-role
subjects:
- kind: ServiceAccount
  name: nexus-prometheus-sa
  namespace: nexus-cyber-intelligence
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-monitoring-pvc
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd

