apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-backend-hpa
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-frontend-hpa
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-frontend
  minReplicas: 3
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-backend-config
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-backend
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 5000
      debug: false
    database:
      pool_size: 20
      max_overflow: 30
      pool_timeout: 30
      pool_recycle: 3600
    redis:
      max_connections: 20
      socket_timeout: 5
      socket_connect_timeout: 5
    kafka:
      consumer_timeout_ms: 1000
      request_timeout_ms: 30000
      retry_backoff_ms: 100
    security:
      session_timeout: 3600
      max_login_attempts: 5
      lockout_duration: 900
    logging:
      level: "INFO"
      format: "json"
      max_size: "100MB"
      backup_count: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-frontend-config
  namespace: nexus-cyber-intelligence
  labels:
    app: nexus-frontend
data:
  config.js: |
    window.NEXUS_CONFIG = {
      API_URL: 'https://api.nexus-cyber-intelligence.com',
      VERSION: 'v2.1.0',
      ENVIRONMENT: 'production',
      FEATURES: {
        THREAT_HUNTING: true,
        AI_ML: true,
        FEDERATED_LEARNING: true,
        SOAR: true,
        MULTI_TENANT: true,
        MOBILE_RESPONSIVE: true,
        REAL_TIME_3D: true,
        QUANTUM_SAFE: true
      },
      SECURITY: {
        CSP_ENABLED: true,
        HSTS_ENABLED: true,
        XSS_PROTECTION: true
      }
    };
---
