version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cybersecurity_db
    environment:
      POSTGRES_DB: cybersecurity_db
      POSTGRES_USER: cybersec_user
      POSTGRES_PASSWORD: cybersec_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cybersecurity_network

  # Redis for Caching and Celery
  redis:
    image: redis:7-alpine
    container_name: cybersecurity_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cybersecurity_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersecurity_backend
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://cybersec_user:cybersec_password@postgres:5432/cybersecurity_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-here
      - JWT_SECRET=your-jwt-secret-here
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - cybersecurity_network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybersecurity_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - cybersecurity_network

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersecurity_celery_worker
    command: celery -A app.celery worker --loglevel=info
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://cybersec_user:cybersec_password@postgres:5432/cybersecurity_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - cybersecurity_network

  # Celery Beat for Scheduled Tasks
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersecurity_celery_beat
    command: celery -A app.celery beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://cybersec_user:cybersec_password@postgres:5432/cybersecurity_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - cybersecurity_network

  # Cuckoo Sandbox for Malware Analysis
  cuckoo:
    image: blacktop/cuckoo:latest
    container_name: cybersecurity_cuckoo
    ports:
      - "8090:8090"
    volumes:
      - cuckoo_data:/var/lib/cuckoo
      - ./datasets/malware:/malware
    environment:
      - CUCKOO_WEB_HOST=0.0.0.0
      - CUCKOO_WEB_PORT=8090
    networks:
      - cybersecurity_network

  # Elasticsearch for Log Analysis
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: cybersecurity_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - cybersecurity_network

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: cybersecurity_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - cybersecurity_network

  # Grafana for Monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: cybersecurity_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cybersecurity_network

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: cybersecurity_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - cybersecurity_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cybersecurity_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - cybersecurity_network

volumes:
  postgres_data:
  redis_data:
  cuckoo_data:
  elasticsearch_data:
  grafana_data:
  prometheus_data:

networks:
  cybersecurity_network:
    driver: bridge



