version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cybersecurity-backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./rules:/app/rules
      - ./feeds:/app/feeds
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    networks:
      - cybersecurity-network

  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cybersecurity-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cybersecurity-network

  # Database service
  db:
    image: postgres:15-alpine
    container_name: cybersecurity-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cybersecurity}
      - POSTGRES_USER=${POSTGRES_USER:-cybersecurity}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cybersecurity-network

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: cybersecurity-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cybersecurity-network

  # Celery worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cybersecurity-celery-worker
    restart: unless-stopped
    command: celery -A backend.celery worker --loglevel=info
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./rules:/app/rules
      - ./feeds:/app/feeds
    depends_on:
      - db
      - redis
    networks:
      - cybersecurity-network

  # Celery beat (scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cybersecurity-celery-beat
    restart: unless-stopped
    command: celery -A backend.celery beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - cybersecurity-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: cybersecurity-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - cybersecurity-network

  # Monitoring service
  monitoring:
    image: prom/prometheus:latest
    container_name: cybersecurity-monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cybersecurity-network

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: cybersecurity-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - monitoring
    networks:
      - cybersecurity-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cybersecurity-network:
    driver: bridge

